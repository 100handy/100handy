name: Admin Web

on:
  pull_request:
    paths:
      - ".github/workflows/admin-web.yml"
      - "apps/admin-web/**"
      - "pnpm-lock.yaml"
      - "package.json"
      - "pnpm-workspace.yaml"
      - "turbo.json"
      - "packages/**"
  push:
    branches:
      - main
      - feat/web-ui
    paths:
      - ".github/workflows/admin-web.yml"
      - "apps/admin-web/**"
      - "pnpm-lock.yaml"
      - "package.json"
      - "pnpm-workspace.yaml"
      - "turbo.json"
      - "packages/**"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: admin-web-pages
  cancel-in-progress: true

jobs:
  verify:
    name: Verify admin web
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.18.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm --dir apps/admin-web test:e2e:install --with-deps

      - name: Lint
        run: pnpm --dir apps/admin-web lint

      - name: Typecheck
        run: pnpm --dir apps/admin-web check-types

      - name: Build
        run: pnpm --dir apps/admin-web build

      - name: Route smoke tests
        run: pnpm --dir apps/admin-web test:e2e

  deploy:
    name: Deploy admin web
    runs-on: ubuntu-latest
    needs: verify
    if: github.event_name == 'push'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.18.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build admin web for GitHub Pages
        run: pnpm --dir apps/admin-web build
        env:
          VITE_BASE_PATH: /100handy/
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/admin-web/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
